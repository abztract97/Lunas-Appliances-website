  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:0 auto 16px\"><\u002Fdiv>\n        Loading inventory...\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ showError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:60px 0;color:rgba(242,238,228,.6);font-size:15px\">Unable to load inventory right now. Please call us at <a href=\"tel:8317228926\" style=\"color:#e9c979\">(831) 722-8926<\u002Fa>.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ showEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:60px 0;color:rgba(242,238,228,.6);font-size:15px\">No items in this category right now. Check back soon — inventory changes frequently.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ showGrid }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px\">\n        <sc-for list=\"{{ invItems }}\" as=\"it\" hint-placeholder-count=\"6\">\n          <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;display:flex;flex-direction:column\">\n            <sc-if value=\"{{ it.img }}\" hint-placeholder-val=\"{{ false }}\">\n              <img src=\"{{ it.img }}\" alt=\"{{ it.name }}\" loading=\"lazy\" onclick=\"{{ it.openGal }}\" style=\"width:100%;height:200px;object-fit:cover;display:block;cursor:pointer;background:#131b40\">\n            <\u002Fsc-if>\n            <sc-if value=\"{{ it.noImg }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"width:100%;height:200px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg, rgba(233,201,121,.07) 0 14px, rgba(233,201,121,.02) 14px 28px);color:rgba(233,201,121,.65);font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase\">{{ it.type }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"padding:16px;display:flex;flex-direction:column;gap:5px;fl tandard-repair-copy\" style=\"width:100%;overflow:auto;min-height:520px;background:#ffffff;flex:1\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1 1 300px;min-width:280px;display:flex;flex-direction:column;gap:16px\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:22px\">\n        <div style=\"font-size:14px;font-weight:700;color:#f2eee4;margin-bottom:14px\">What to expect<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:rgba(233,201,121,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#e9c979;flex-shrink:0\">✦<\u002Fspan><span style=\"font-size:13px;color:rgba(242,238,228,.65);line-height:1.55\">Our technician <strong style=\"color:#f2eee4\">comes to your home<\u002Fstrong> at your scheduled time<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:rgba(233,201,121,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#e9c979;flex-shrink:0\">✦<\u002Fspan><span style=\"font-size:13px;color:rgba(242,238,228,.65);line-height:1.55\"><strong style=\"color:#f2eee4\">$140<\u002Fstrong> covers diagnosis and repair. If we can't fix it on this visit, you only pay <strong style=\"color:#f2eee4\">$110<\u002Fstrong>. Parts additional if needed.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:rgba(233,201,121,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#e9c979;flex-shrink:0\">✦<\u002Fspan><span style=\"font-size:13px;color:rgba(242,238,228,.65);line-height:1.55\"><strong style=\"color:#f2eee4\">90-day guarantee<\u002Fstrong> on all labor and parts<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:rgba(233,201,121,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#e9c979;flex-shrink:0\">✦<\u002Fspan><span style=\"font-size:13px;color:rgba(242,238,228,.65);line-height:1.55\">You'll enter your address when booking so we know where to go<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:rgba(233,201,121,.07);border:1px solid rgba(233,201,121,.3);border-radius:16px;padding:22px\">\n        <div style=\"font-size:14px;font-weight:700;color:#f2eee4;margin-bottom:6px\">Need an emergency repair?<\u002Fdiv>\n        <p style=\"font-size:13px;color:rgba(242,238,228,.6);margin:0 0 16px;line-height:1.5\">For same-day or Saturday appointments, leave your info and we'll confirm availability as soon as possible.<\u002Fp>\n        <div style=\"background:rgba(11,18,48,.6);border-radius:10px;padding:12px 14px;margin-bottom:16px;border:1px solid rgba(255,255,255,.1)\">\n          <div style=\"font-size:13px;font-weight:700;color:#e9c979;margin-bottom:4px\">Emergency rate: $190<\u002Fdiv>\n          <div style=\"font-size:12px;color:rgba(242,238,228,.55);line-height:1.5\">Includes diagnostic and repair. Parts billed separately at cost if needed. $50 more than the standard rate for priority scheduling.<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ satNotSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div><label style=\"display:block;font-size:13px;font-weight:600;color:#f2eee4;margin-bottom:5px\">Your name<\u002Flabel><input type=\"text\" id=\"sat-name\" placeholder=\"First and last name\" style=\"width:100%;box-sizing:border-box;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 13px;font-family:'Karla',sans-serif;font-size:14px;color:#f2eee4;background:rgba(255,255,255,.06);outline:none\" style-focus=\"border-color:#e9c979\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:13px;font-weight:600;color:#f2eee4;margin-bottom:5px\">Phone number<\u002Flabel><input type=\"tel\" id=\"sat-phone\" placeholder=\"(831) 000-0000\" style=\"width:100%;box-sizing:border-box;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 13px;font-family:'Karla',sans-serif;font-size:14px;color:#f2eee4;background:rgba(255,255,255,.06);outline:none\" style-focus=\"border-color:#e9c979\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:13px;font-weight:600;color:#f2eee4;margin-bottom:5px\">Preferred date<\u002Flabel><input type=\"text\" id=\"sat-date\" placeholder=\"e.g. Today, July 19, Saturday\" style=\"width:100%;box-sizing:border-box;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 13px;font-family:'Karla',sans-serif;font-size:14px;color:#f2eee4;background:rgba(255,255,255,.06);outline:none\" style-focus=\"border-color:#e9c979\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:13px;font-weight:600;color:#f2eee4;margin-bottom:5px\">Appliance type<\u002Flabel><input type=\"text\" id=\"sat-appliance\" placeholder=\"e.g. Whirlpool washer\" style=\"width:100%;box-sizing:border-box;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 13px;font-family:'Karla',sans-serif;font-size:14px;color:#f2eee4;background:rgba(255,255,255,.06);outline:none\" style-focus=\"border-color:#e9c979\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:13px;font-weight:600;color:#f2eee4;margin-bottom:5px\">Describe the issue<\u002Flabel><textarea id=\"sat-issue\" rows=\"3\" placeholder=\"What's wrong with the appliance?\" style=\"width:100%;box-sizing:border-box;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 13px;font-family:'Karla',sans-ser
